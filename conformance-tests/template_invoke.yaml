        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
      Environment:
        Variables:
          TARGET_FUNCTION_NAME:
            Fn::Sub: "${TargetError.Arn}:$LATEST"

  InvokeTimeout:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: [] # ["5-17"]
    Properties:
      CodeUri: .
      Handler: invoke.InvokeTimeout
      Description: Invoke timeout (target takes too long)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
      Environment:
        Variables:
          TARGET_FUNCTION_NAME:
            Fn::Sub: "${TargetSlow.Arn}:$LATEST"

  InvokeTimeoutCaught:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: [] # ["5-18"]
    Properties:
      CodeUri: .
      Handler: invoke.InvokeTimeoutCaught
      Description: Invoke timeout, caught
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
        - Arn
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300
      Environment:
        Variables:
          TARGET_FUNCTION_NAME:
            Fn::Sub: "${TargetSlow.Arn}:$LATEST"

  InvokeReplaySkips:
