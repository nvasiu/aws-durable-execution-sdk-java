    TestingMetadata:
      TestDescription: ["6-13"]
    Properties:
      CodeUri: .
      Handler: wait_for_condition.WaitForConditionMultipleSequential
      Description: Multiple sequential wait_for_condition operations — first result seeds second
      Role:
