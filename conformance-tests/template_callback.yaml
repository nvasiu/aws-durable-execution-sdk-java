AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Durable Execution Conformance Test Examples - Java (Callback)

Parameters:
  Architecture:
    Type: String
    Default: arm64
    AllowedValues: [x86_64, arm64]
  JavaVersion:
    Type: String
    Default: 'java21'

Globals:
  Function:
    Timeout: 60
    MemorySize: 512
    Runtime:
      Ref: JavaVersion
    Architectures:
      - Ref: Architecture

Resources:
  DurableFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DurableExecutionPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - lambda:CheckpointDurableExecution
                  - lambda:GetDurableExecutionState
                  - lambda:SendDurableExecutionCallbackSuccess
                  - lambda:SendDurableExecutionCallbackFailure
                  - lambda:SendDurableExecutionCallbackHeartbeat
                Resource: '*'

  CallbackBasic:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["4-1"]
    Properties:
      CodeUri: .
      Handler: callback.CallbackBasic
      Description: Callback basic - anonymous, success
      Role:
        Fn::GetAtt: [DurableFunctionRole, Arn]
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300

  CallbackWithName:
    Type: AWS::Serverless::Function
    TestingMetadata:
      TestDescription: ["4-2"]
    Properties:
      CodeUri: .
      Handler: callback.CallbackWithName
      Description: Callback with explicit name
      Role:
        Fn::GetAtt: [DurableFunctionRole, Arn]
      DurableConfig:
        RetentionPeriodInDays: 7
        ExecutionTimeout: 300

  CallbackTimeout:
