      TestDescription: ["7-4"]
    Properties:
      CodeUri: .
      Handler: wait_for_callback.WaitForCallbackExternalFailure
      Description: Wait-for-callback external failure (uncaught)
      Role:
        Fn::GetAtt:
        - DurableFunctionRole
