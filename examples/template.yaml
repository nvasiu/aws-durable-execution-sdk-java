        - - !Ref FunctionNamePrefix
          - otel-xray-step-example
      Handler: "software.amazon.lambda.durable.examples.otel.OtelXRayStepExample"
      Role: !Ref RoleArn
      Tracing: Active
      Layers:
        - !Sub
          - arn:aws:lambda:${AWS::Region}:901920570463:layer:aws-otel-java-agent-${AdotArch}-ver-1-32-0:6
          - AdotArch: amd64

  OtelXRayWaitExampleFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Join
