AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: AWS Lambda Durable Execution SDK Examples

Parameters:
  Architecture:
    Type: String
    Default: arm64
    Description: Lambda Function Architecture
    AllowedValues:
      - x86_64
      - arm64
  JavaVersion:
    Type: String
    Default: 'java17'
    Description: Java runtime version
  FunctionNamePrefix:
    Type: String
    Default: ''
    Description: Optional prefix for Lambda function names
  RoleArn:
    Type: String
    Description: IAM Role ARN for Lambda function execution

Conditions:
  IsJava21OrLater:
    !Or
      - !Equals [!Ref JavaVersion, 'java21']
      - !Equals [!Ref JavaVersion, 'java25']

Globals:
  Function:
    Timeout: 900
    MemorySize: 512
    Architectures:
      - !Ref Architecture
    DurableConfig:
      ExecutionTimeout: 300
      RetentionPeriodInDays: 7
    Runtime: !Ref JavaVersion
    Environment:
      Variables:
        FUNCTION_NAME_PREFIX: !Ref FunctionNamePrefix

Resources:
  NoopExampleFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Join
        - ''
        - - !Ref FunctionNamePrefix
          - noop-example
      Handler: "software.amazon.lambda.durable.examples.general.NoopExample"
      Role: !Ref RoleArn

  SimpleStepExampleFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Join
        - ''
        - - !Ref FunctionNamePrefix
          - simple-step-example
      Handler: "software.amazon.lambda.durable.examples.step.SimpleStepExample"
      Role: !Ref RoleArn

  SimpleInvokeExampleFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Join
        - ''
        - - !Ref FunctionNamePrefix
          - simple-invoke-example
      Handler: "software.amazon.lambda.durable.examples.invoke.SimpleInvokeExample"
      Role: !Ref RoleArn

  WaitExampleFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Join
        - ''
        - - !Ref FunctionNamePrefix
          - wait-example
      Handler: "software.amazon.lambda.durable.examples.wait.WaitExample"
      Role: !Ref RoleArn

  RetryExampleFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Join
        - ''
        - - !Ref FunctionNamePrefix
